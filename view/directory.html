<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Storm Gaming" content="Video game store">
    <title>Storm Gaming</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Start Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Storm Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="directory.html">Directory</a>
                    </li>
                </ul>
                <form class="d-flex ms-3" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search games..." aria-label="Search">
                    <button class="btn btn-outline-light" type="button"><i class="bi bi-search"></i></button>
                </form>
            </div>
        </div>
    </nav>
    <!-- End Navigation -->

    <!--Start Main-->
    <div class="list-container ps-4">
        <div class="row mt-4 mb-3">
            <div class="col-6 col-md-3">
                <h2> Games Log </h2>
            </div>
            <div class="col-6 col-md-3">
                <!-- Button trigger modal -->
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#gameFormModal" onclick="resetForm();">
                    <i class="bi bi-plus-lg"></i> Add Game 
                </button>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div>
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th> ID </th>
                                <th> Name </th>
                                <th> Developer </th>
                                <th> Genre </th>
                                <th> Description </th>
                            </tr>
                        </thead>
                        <tbody id="gamedata">
                            <tr>
                                <td> </td>
                                <td> id </td>
                                <td> name </td>
                                <td> developer </td>
                                <td> genre </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Game Modal -->
    <div class="modal fade" id="gameFormModal" tabindex="-1" aria-labelledby="gameFormModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="gameFormModalLabel">Add a Game</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="modal-add-game-form" action="/game" method="POST">
                        <input type="hidden" name="txt_id" value="" />
                        <p class="mb-3">Fill out the fields below to add a game</p>
                        <ol class="mb-4">
                            <li><input class="form-control me-2 mb-3" type="text" name="txt_name" placeholder="Game title" /></li>
                            <li><input class="form-control me-2 mb-3" type="text" name="txt_developer" placeholder="Developer" /></li>
                            <li><input class="form-control me-2 mb-3" type="text" name="txt_genre" placeholder="Genre (e.g. Hero Shooter)" /></li>
                            <li><textarea class="form-control me-2 mb-3" name="txt_description" rows="4" placeholder="Describe the game"></textarea></li>
                        </ol>
                        <button class="btn btn-primary" type="submit">Publish</button>
                        <button type="button" class="btn btn-secondary ms-2" data-bs-dismiss="modal">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- View/Edit Game Modal -->
    <div class="modal fade" id="gameViewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="gameViewTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="modal-edit-game-form">
                        <input type="hidden" name="txt_id" id="editTxtId" />
                        <ol class="mb-4">
                            <li><input class="form-control me-2 mb-3" type="text" id="editTxtName" name="txt_name" placeholder="Game title" /></li>
                            <li><input class="form-control me-2 mb-3" type="text" id="editTxtDeveloper" name="txt_developer" placeholder="Developer" /></li>
                            <li><input class="form-control me-2 mb-3" type="text" id="editTxtGenre" name="txt_genre" placeholder="Genre" /></li>
                            <li><textarea class="form-control me-2 mb-3" id="editTxtDescription" name="txt_description" rows="4" placeholder="Describe the game"></textarea></li>
                        </ol>
                        <button class="btn btn-primary" type="submit">Save</button>
                        <button type="button" class="btn btn-danger ms-2" id="deleteGameBtn">Delete</button>
                        <button type="button" class="btn btn-secondary ms-2" data-bs-dismiss="modal">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal fade" id="gameDeleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Delete game?</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete <strong id="deleteGameName"></strong>?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
    </body>
    </html>
