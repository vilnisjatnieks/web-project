
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Storm Gaming" content="Video game store">
    <title>Storm Gaming</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Start Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Storm Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="directory.html">Directory</a>
                    </li>
                </ul>
                <form class="d-flex ms-3" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search games..." aria-label="Search">
                    <button class="btn btn-outline-light" type="button"><i class="bi bi-search"></i></button>
                </form>
            </div>
        </div>
    </nav>
    <!-- End Navigation -->



    <!-- Start Hero Section -->
    <header class="hero text-white text-center py-5">
        <div class="container">
            <h1 class="display-4">Welcome to Storm</h1>
            <p class="lead">Not a Steam rip-off</p>
        </div>
    </header>
    <!-- End Hero Section -->



    <!-- Start Main Content -->
    <main class="container my-5">
        <div class="row">
            <div class="col-md-8">

                <button id="show-form-btn" class="btn btn-success mb-3">Create a Guide</button>

                <form id="add-game-form" action="/game" method="POST" style="display: none;">
                    <h5 class="mb-5">To get started with your guide, fill out the fields below</h5>
                    <ol class="mb-5">
                        <li> <input class="form-control me-2 mb-3" type="text" placeholder="Enter the title for your guide" /></li>
                        <li> <input class="form-control me-2 mb-3" type="text" placeholder="Enter the game title" /></li>
                        <li> <textarea class="form-control me-2 mb-3" name="description" rows="4" placeholder="Describe your guide"></textarea> </li>
                    </ol>

                    <button class="btn btn-primary" type="submit">Publish</button>
                    <button id="cancel-form-btn" class="btn btn-secondary ms-2" type="button">Cancel</button>
                </form>

   

            </div>

            <div class="col-md-4">
                <div class="aside-content text-md-end">
                    <h3>Current games</h3>
                    <div id="games-list" class="list-group">
                        <p class="text-muted">Loading games...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- End Main Content -->



    <!-- Start Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2026 My Website. All rights reserved.</p>
        </div>
    </footer>
    <!-- End Footer -->



    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>

</body>

</html>
